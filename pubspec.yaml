name: whisnya
description: "A local-first AI role chat and TXT novel reader app."
publish_to: 'none'
version: 1.3.7+15

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.6.0
  path_provider: ^2.1.6
  file_picker: 10.3.7
  image: ^4.9.1
  archive: 4.0.9
  xml: ^7.0.1
  flutter_svg: ^2.3.0
  crypto: ^3.0.7
  charset: ^2.0.1
  flutter_secure_storage: ^10.3.1
  flutter_markdown_plus: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  flutter_secure_storage_windows:
    path: third_party/flutter_secure_storage_windows

flutter:
  uses-material-design: true
